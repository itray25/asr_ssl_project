experiment:
  name: logmel_ctc
  output_dir: runs/logmel_ctc
  seed: 1337

data:
  dataset: librispeech
  root: data
  train_split: train-clean-100
  dev_split: dev-clean
  test_split: test-clean
  download: false
  sample_rate: 16000
  max_train_hours: 1.0
  max_train_samples: null
  max_eval_samples: null

vocab:
  type: char

model:
  type: logmel_ctc
  n_mels: 80
  encoder: bilstm
  hidden_size: 64
  num_layers: 1
  dropout: 0.1

training:
  device: auto
  epochs: 10
  batch_size: 8
  num_workers: 0
  learning_rate: 0.001
  weight_decay: 0.0
  grad_clip: 5.0
  log_interval: 1
  save_best: true

decoding:
  strategy: greedy
